<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToS Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <span class="logo">
          <span class="logo-dot"></span>
          ToS Reader
        </span>
        <div class="header-right">
          <select id="profile-select" class="profile-select" title="Your profile">
            <option value="general">General</option>
            <option value="journalist">Journalist</option>
            <option value="activist">Activist</option>
            <option value="business">Business</option>
          </select>
          <a href="stats.html" class="header-link">Stats</a>
        </div>
      </header>

      <!-- Idle: choose profile then analyze -->
      <div id="state-idle" class="state hidden">
        <div class="idle-profile-row">
          <span class="idle-label">Analyze as</span>
          <div class="idle-profiles">
            <button class="profile-btn active" data-profile="general">General</button>
            <button class="profile-btn" data-profile="journalist">Journalist</button>
            <button class="profile-btn" data-profile="activist">Activist</button>
            <button class="profile-btn" data-profile="business">Business</button>
          </div>
        </div>
        <div class="profile-desc" id="profile-desc">Standard analysis of key clauses and risks.</div>
        <button id="analyze-btn" class="analyze-btn">Analyze this page</button>
      </div>

      <!-- Loading -->
      <div id="state-loading" class="state hidden">
        <div class="spinner"></div>
        <p class="muted" style="text-align:center">Analyzing Terms of Service…</p>
      </div>

      <!-- No ToS detected -->
      <div id="state-no-tos" class="state hidden">
        <p class="muted">No Terms of Service detected on this page.</p>
        <button id="retry-btn" class="retry-btn">Try again</button>
      </div>

      <!-- Error -->
      <div id="state-error" class="state hidden">
        <p class="error-msg">Something went wrong.</p>
        <p id="error-detail" class="muted"></p>
      </div>

      <!-- Result -->
      <div id="state-result" class="hidden">

        <!-- Risk card -->
        <div id="risk-badge" class="risk-card">
          <div>
            <div id="risk-score" class="risk-score-num"></div>
          </div>
          <div class="risk-info">
            <div id="risk-label" class="risk-label-text"></div>
            <div class="risk-sublabel">Risk Score</div>
            <div class="risk-bar-wrap">
              <div id="risk-bar" class="risk-bar-fill"></div>
            </div>
          </div>
        </div>

        <div class="result-body">

          <!-- Subscribe -->
          <div id="subscribe-row" class="hidden">
            <button id="subscribe-btn" class="subscribe-btn"></button>
          </div>

          <!-- Version diff -->
          <section id="diff-section" class="hidden">
            <div class="section-label">What changed</div>
            <div id="diff-list"></div>
          </section>

          <!-- TLDR -->
          <section id="tldr-section">
            <div class="section-label">Summary</div>
            <p id="tldr-text"></p>
          </section>

          <!-- Alternatives -->
          <section id="alternatives-section" class="hidden">
            <div class="section-label">Consider instead</div>
            <div id="alternatives-list"></div>
          </section>

          <!-- Clauses -->
          <section id="clauses-section">
            <div class="section-label">Key Clauses</div>
            <div id="clauses-list"></div>
          </section>

        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
